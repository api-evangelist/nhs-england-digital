providerId: nhs-england-digital
publisherName: NHS England Digital
serviceCategory: API
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Clinical
  - Demographics
  - FHIR
  - Government
  - Health
  - Healthcare
  - NHS
  - Open Data
  - Patient Records
